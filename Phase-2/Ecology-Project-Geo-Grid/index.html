<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKnowledge | Environmental Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --glass: rgba(15, 18, 24, 0.9);
            --accent: #34d399;
        }

        body {
            background: #05070a;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }

        /* Mobile Nav Toggle */
        #nav-menu.hidden-mobile {
            display: none;
        }

        @media (min-width: 1024px) {
            #nav-menu.hidden-mobile {
                display: flex;
            }
        }

        input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            color: white !important;
            width: 100%;
        }

        input:focus {
            border-color: var(--accent) !important;
            outline: none;
        }

        /* Smooth Scale for Mobile */
        @media (max-width: 640px) {
            .glass-card {
                border-radius: 1rem;
                padding: 1.5rem !important;
            }

            h1 {
                font-size: 1.5rem !important;
            }
        }
    </style>
</head>

<body class="p-4 md:p-6 lg:p-10">

    <div class="max-w-[1600px] mx-auto space-y-6">

        <nav class="flex flex-wrap items-center justify-between p-5 glass-card sticky top-4 z-50 border-emerald-500/10">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="w-8 h-8 md:w-10 md:h-10">
                <span class="text-xl md:text-2xl font-black tracking-tighter">EcoKnowledge</span>
            </div>

            <button id="menu-toggle" class="lg:hidden text-slate-400 p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>

            <div id="nav-menu"
                class="hidden-mobile w-full lg:w-auto lg:flex gap-4 lg:gap-8 text-[10px] font-bold uppercase tracking-widest mt-4 lg:mt-0">
                <a href="#"
                    class="block py-2 text-emerald-400 border-b-2 border-emerald-400 lg:border-none">Simulation</a>
                <a href="index_final.html" class="block py-2 text-slate-400 hover:text-white transition-colors">View AP
                    EcoGrid Analysis</a>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
            <div class="xl:col-span-1 glass-card p-6 order-2 xl:order-1">
                <h3
                    class="text-[10px] font-bold text-emerald-400 uppercase tracking-[0.2em] mb-4 text-center xl:text-left">
                    Global Weights</h3>
                <img src="assets/summary.jpg"
                    class="w-full rounded-xl opacity-80 mb-4 shadow-lg mx-auto max-w-[300px] xl:max-w-full">
                <p class="text-[11px] text-slate-500 italic text-center xl:text-left">Pre-trained feature importance
                    weights.</p>
            </div>

            <div
                class="md:col-span-2 xl:col-span-2 glass-card p-6 md:p-10 order-1 xl:order-2 border-emerald-500/20 shadow-2xl">
                <form id="ecoForm" class="flex flex-col gap-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-8">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Greenness (%)</label>
                                <input type="number" step="any" name="Greenness" value="45.5" class="p-3 md:p-4">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">Urban Density</label>
                                <input type="number" step="any" name="Urban_Density" value="10.2" class="p-3 md:p-4">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[10px] text-slate-500 uppercase">UHI</label>
                                    <input type="number" step="any" name="UHI" value="-0.5" class="p-3 text-xs">
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-500 uppercase">LSTVI</label>
                                    <input type="number" step="any" name="LSTVI" value="0.05" class="p-3 text-xs">
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">PM 2.5 Levels</label>
                                <input type="number" step="any" name="PM25" value="20.1"
                                    class="p-3 md:p-4 border-red-500/20">
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-6 mt-4">
                        <div id="resultDisplay"
                            class="hidden text-center p-6 bg-emerald-500/5 rounded-2xl border border-emerald-500/10">
                            <h2 id="resCategory" class="text-2xl font-black italic text-white">Healthy</h2>
                            <div class="text-4xl md:text-5xl font-black mt-1 text-emerald-400" id="resScore">0.00</div>
                        </div>

                        <button type="submit" id="submitBtn"
                            class="w-full bg-emerald-500 text-black font-black py-4 md:py-5 rounded-xl hover:brightness-110 active:scale-95 transition-all flex justify-center items-center gap-3">
                            <span id="btnText">Analyze Environment</span>
                            <div id="loader"
                                class="hidden w-5 h-5 border-2 border-black border-t-transparent rounded-full animate-spin">
                            </div>
                        </button>
                    </div>
                </form>
            </div>

            <div class="xl:col-span-1 glass-card p-6 order-3">
                <h3
                    class="text-[10px] font-bold text-emerald-400 uppercase tracking-[0.2em] mb-4 text-center xl:text-left">
                    Local Decision Path</h3>
                <img src="assets/waterfall%20plot.jpg"
                    class="w-full rounded-xl opacity-80 mb-4 shadow-lg mx-auto max-w-[300px] xl:max-w-full">
                <p class="text-[11px] text-slate-500 italic text-center xl:text-left">SHAP waterfall breakdown.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">
            <div class="glass-card p-6 md:p-8">
                <h3 class="font-bold text-base md:text-lg mb-6 flex flex-wrap justify-between items-center gap-2">
                    Environmental Benchmarking
                    <span class="text-[9px] text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded">2026 INDIA
                        TARGETS</span>
                </h3>
                <div class="h-64 md:h-80"><canvas id="benchChart"></canvas></div>
            </div>

            <div class="glass-card p-6 md:p-8">
                <h3 class="font-bold text-base md:text-lg mb-2">Correlation Profile</h3>
                <div class="h-64 md:h-80 relative">
                    <div
                        class="absolute bottom-0 left-0 w-full flex justify-between px-1 md:px-4 text-[9px] font-black text-slate-500 uppercase tracking-widest pointer-events-none">
                        <span>Min</span>
                        <span class="text-emerald-500/50">Optimal</span>
                        <span>Max</span>
                    </div>
                    <canvas id="corrChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MOBILE NAV TOGGLE
        document.getElementById('menu-toggle').onclick = () => {
            document.getElementById('nav-menu').classList.toggle('hidden-mobile');
        };

        const ctx1 = document.getElementById('benchChart').getContext('2d');
        const ctx2 = document.getElementById('corrChart').getContext('2d');

        const benchChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['Green %', 'PM 2.5', 'Density'],
                datasets: [
                    { label: 'Simulation', data: [45.5, 20.1, 10.2], backgroundColor: '#34d399', borderRadius: 8 },
                    { label: 'Target', data: [35, 15, 12], backgroundColor: 'rgba(255,255,255,0.08)', borderRadius: 8 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#f8fafc' } } },
                plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc', boxWidth: 10, font: { size: 10 } } } }
            }
        });

        const corrChart = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: Array.from({ length: 40 }, (_, i) => i),
                datasets: [
                    {
                        label: 'Curve',
                        data: Array.from({ length: 40 }, (_, i) => 2 + 3 * Math.exp(-Math.pow(i - 20, 2) / 100)),
                        borderColor: '#34d399', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(52, 211, 153, 0.05)'
                    },
                    {
                        label: 'Live', data: [{ x: 20, y: 5 }], type: 'scatter', backgroundColor: '#fff', borderColor: '#34d399', borderWidth: 3, pointRadius: 8
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { display: false, min: 0, max: 6 }, x: { display: false } },
                plugins: { legend: { display: false } }
            }
        });

        document.getElementById('ecoForm').addEventListener('input', (e) => {
            const formData = new FormData(document.getElementById('ecoForm'));
            const green = parseFloat(formData.get('Greenness')) || 0;
            const pm = parseFloat(formData.get('PM25')) || 0;

            benchChart.data.datasets[0].data = [green, pm, parseFloat(formData.get('Urban_Density')) || 0];
            benchChart.update('none');

            let xPos = 20 + (green - 35) - (pm - 15);
            xPos = Math.max(0, Math.min(39, xPos));
            corrChart.data.datasets[1].data = [{ x: xPos, y: 2 + 3 * Math.exp(-Math.pow(xPos - 20, 2) / 100) }];
            corrChart.update('none');
        });

        document.getElementById('ecoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const resultDisplay = document.getElementById('resultDisplay');

            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const response = await fetch('https://186a-223-230-80-112.ngrok-free.app/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Greenness: parseFloat(e.target.Greenness.value),
                        Urban_Density: parseFloat(e.target.Urban_Density.value),
                        UHI: parseFloat(e.target.UHI.value),
                        LSTVI: parseFloat(e.target.LSTVI.value),
                        PM25: parseFloat(e.target.PM25.value)
                    })
                });
                const data = await response.json();
                if (data.success) {
                    resultDisplay.classList.remove('hidden');
                    document.getElementById('resCategory').innerText = data.prediction.category;
                    gsap.to({ v: 0 }, {
                        v: data.prediction.raw_score, duration: 1, onUpdate: function () {
                            document.getElementById('resScore').innerText = this.targets()[0].v.toFixed(2);
                        }
                    });
                }
            } catch (err) { alert("Backend Offline"); }
            finally { btn.disabled = false; loader.classList.add('hidden'); }
        });
    </script>
</body>

</html>
